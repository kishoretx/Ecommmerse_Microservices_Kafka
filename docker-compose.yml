services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: tinycorp-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - CLUSTER_ID=MDEyMzQ1Njc4OUFCQ0RFRg
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tinycorp-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=tinycorp-local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092

  product-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: product-service
    container_name: tinycorp-product-service
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  order-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: order-service
    container_name: tinycorp-order-service
    depends_on:
      kafka:
        condition: service_healthy
      product-service:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PRODUCT_SERVICE_URL=http://product-service:8081
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: payment-service
    container_name: tinycorp-payment-service
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: notification-service
    container_name: tinycorp-notification-service
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/actuator/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  dashboard-ui:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: dashboard-ui
    container_name: tinycorp-dashboard-ui
    depends_on:
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - PRODUCT_SERVICE_URL=http://product-service:8081
      - ORDER_SERVICE_URL=http://order-service:8082
      - PAYMENT_SERVICE_URL=http://payment-service:8083
      - NOTIFICATION_SERVICE_URL=http://notification-service:8084
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
