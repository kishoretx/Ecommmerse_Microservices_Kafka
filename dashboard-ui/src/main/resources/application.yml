server:
  port: 8080

spring:
  application:
    name: dashboard-ui

services:
  product:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8081}
  order:
    url: ${ORDER_SERVICE_URL:http://localhost:8082}
  payment:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8083}
  notification:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    com.tinycorp.dashboard: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
