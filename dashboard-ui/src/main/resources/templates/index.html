<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinyCorp Ecommerce Control Center</title>
    <link rel="stylesheet" href="/css/app.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="bg-shape"></div>
<main>
    <header>
        <h1>TinyCorp Ecommerce Control Center</h1>
        <p>Kafka event streaming dashboard for product, order, payment, and notification microservices.</p>
    </header>

    <section class="actions">
        <button id="refreshBtn" type="button">Refresh Metrics</button>
        <button id="seedOrdersBtn" type="button">Generate 10 Demo Orders</button>
        <span id="status"></span>
    </section>

    <section class="cards" id="cards"></section>

    <section class="order-panel">
        <h2>Place Order</h2>
        <form id="orderForm">
            <div class="grid2">
                <label>
                    Customer Name
                    <input id="customerName" type="text" required placeholder="Alex Carter">
                </label>
                <label>
                    Customer Email
                    <input id="customerEmail" type="email" required placeholder="alex@example.com">
                </label>
            </div>

            <div class="line-items-header">
                <h3>Line Items</h3>
                <button id="addItemBtn" type="button">Add Item</button>
            </div>
            <div id="lineItems"></div>

            <div class="cart-total-wrap">
                <span>Cart Total</span>
                <strong id="cartTotal">$0.00</strong>
            </div>

            <div class="order-actions">
                <button type="submit">Place Order</button>
                <span id="orderStatus"></span>
            </div>
        </form>
    </section>

    <section class="charts">
        <div class="chart-panel"><canvas id="orderChart"></canvas></div>
        <div class="chart-panel"><canvas id="paymentChart"></canvas></div>
    </section>
</main>
<script src="/js/app.js"></script>
</body>
</html>
